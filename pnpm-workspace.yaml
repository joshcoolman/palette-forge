# Build-script approvals for pnpm 11 (what Vercel runs, per the packageManager
# pin). pnpm 11 gates native build scripts behind `allowBuilds` (a map); the old
# `onlyBuiltDependencies` list is silently ignored in v11 — which is what made
# Vercel's non-interactive `pnpm install` exit 1 with ERR_PNPM_IGNORED_BUILDS on
# unrs-resolver (the oxc-backed resolver behind eslint-plugin-import). esbuild and
# lightningcss likewise build native binaries on install.
allowBuilds:
  esbuild: true
  lightningcss: true
  unrs-resolver: true
