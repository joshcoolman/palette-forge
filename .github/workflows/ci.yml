name: CI

# The repo's claim is "gate green on every commit." This makes that verifiable:
# the same four-step gate run locally (tsc, eslint, vitest, build) runs on every
# push and PR. Tailored to the stack — pnpm 11 (pinned via packageManager) +
# TanStack Start/Nitro — not a generic Node template.

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # action-setup reads the pnpm version from package.json "packageManager".
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm exec tsc

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
